[project]
name = "devex-cli"
version = "0.1.0"
description = "DevEx CLI — Golden Path tooling for polyglot teams"
readme = "README.md"
requires-python = ">=3.11"
license = { text = "MIT" }
authors = [
    { name = "Jorge Flores" },
]
keywords = ["devex", "platform", "cli", "golden-path", "dora"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Software Development :: Build Tools",
]

dependencies = [
    "typer>=0.12",
    "rich>=13",
    "pydantic>=2",
    "gitpython>=3.1",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.4",
    "pytest-cov>=4.1",
    "pytest-mock>=3.11",
    "ruff>=0.4",
    "mypy>=1.5",
]

[project.scripts]
devex = "devex.__main__:app"

[project.urls]
Homepage = "https://github.com/JynLeazy1/devex"
Repository = "https://github.com/JynLeazy1/devex"
Issues = "https://github.com/JynLeazy1/devex/issues"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/devex"]

[tool.hatch.build.targets.sdist]
include = ["src/devex", "README.md", "LICENSE"]

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "N", "W", "UP", "B", "SIM"]
ignore = [
    "E501",
    "UP042",  # `(str, Enum)` is the canonical Pydantic-compatible enum pattern
]

[tool.ruff.lint.per-file-ignores]
"src/devex/__main__.py" = ["B008"]  # typer.Option/Argument in defaults is idiomatic Typer

[tool.mypy]
python_version = "3.11"
strict = true
warn_unused_ignores = true
warn_redundant_casts = true

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
addopts = "-v --strict-markers"
